name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Run tests
        run: swift test -v

      - name: Assemble app bundle
        run: ./build-app.sh
